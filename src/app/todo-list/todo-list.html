<!-- src/app/todo-list/todo-list.component.html -->

<ul class="todo-list">
  <li *ngFor="let todo of todos" [class.completed]="todo.completed">
    <input
      type="checkbox"
      [checked]="todo.completed"
      (change)="toggleCompleted(todo)"
      aria-labelledby="title-{{todo.id}}"
    />

    <span
      *ngIf="editingId !== todo.id"
      (click)="editingId = todo.id"
      class="todo-title"
      id="title-{{todo.id}}"
    >
      {{ todo.title }}
    </span>

    <input
      *ngIf="editingId === todo.id"
      type="text"
      [(ngModel)]="todo.title"
      (blur)="finishEdit(todo)"
      (keyup.enter)="finishEdit(todo)"
      class="edit-input"
      title="Rediger oppgavenavn"
      autofocus
    />

    <button class="delete-btn" (click)="deleteTodo(todo.id)">×</button>
  </li>
</ul>

<div class="add-form">
  <input
    type="text"
    placeholder="Ny oppgave…"
    [(ngModel)]="newTitle"
    (keyup.enter)="addTodo()"
  />

  <input
    type="datetime-local"
    [(ngModel)]="newDueDateTime"
    class="due-input"
    placeholder="Due date and time"
  />

  <button (click)="addTodo()">Legg til</button>
</div>
