<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#007c89" />
    <title>Tadoo is offline</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f7fbfb; color: #153b3f; font: 16px/1.5 system-ui, sans-serif; }
      main { max-width: 28rem; padding: 2rem; text-align: center; }
      img { width: 112px; height: 112px; border-radius: 24px; }
      h1 { margin: 1rem 0 .5rem; }
      button { border: 0; border-radius: 999px; padding: .75rem 1.25rem; color: white; background: #007c89; font: inherit; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="" />
      <h1>You’re offline</h1>
      <p>Tadoo will reconnect to your family as soon as your connection returns.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
